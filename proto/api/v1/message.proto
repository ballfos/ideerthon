syntax = "proto3";

package api.v1;

import "google/protobuf/timestamp.proto";

message Message {
  string id = 1;
  string uid = 2;
  string text = 3;
  google.protobuf.Timestamp created_at = 4;
  bool is_favorite = 5;
  string talk_id = 6;
  string agent_name = 7;
}

message SendMessageRequest {
  string talk_id = 1;
  string text = 2;
}

message SendMessageResponse {
  Message message = 1;
}

message ToggleFavoriteRequest {
  string talk_id = 1;
  string message_id = 2;
}

message ToggleFavoriteResponse {
  bool is_favorite = 1;
}

message ListFavoriteMessagesRequest {}

message ListFavoriteMessagesResponse {
  repeated Message messages = 1;
}

service MessageService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc ToggleFavorite(ToggleFavoriteRequest) returns (ToggleFavoriteResponse);
  rpc ListFavoriteMessages(ListFavoriteMessagesRequest) returns (ListFavoriteMessagesResponse);
}
