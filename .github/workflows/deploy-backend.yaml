name: Deploy Backend to Cloud Run

on:
  push:
    branches: [ "main" ]
    paths: [ "backend/**" ]
  workflow_dispatch:

env:
  PROJECT_ID: ideerthon
  REGION: asia-northeast2
  VERTEX_REGITON: global
  SERVICE_NAME: ideerthon

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Run tests
        run: go test ./...

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          source: ./backend
          flags: >
            --use-http2
            --no-cpu-throttling
            --max-instances=5
            --allow-unauthenticated
            --timeout=200s
          env_vars: |-
            ALLOWED_ORIGIN=${{ vars.ALLOWED_ORIGIN }}
            GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
            VERTEX_AI_PROJECT_ID=${{ env.PROJECT_ID }}
            VERTEX_AI_LOCATION=${{ env.VERTEX_REGITON }}

      - name: Show Output
        run: echo "$DEPLOY_URL"
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}